<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CORE AI | SKY-NET</title>
    <style>
        :root {
            --bg: #f0f4f8; /* Soft White/Grey */
            --primary: #00a8ff; /* Sky Blue */
            --dark: #1a2a3a;
            --glass: rgba(255, 255, 255, 0.8);
            --blue-glow: 0 0 20px rgba(0, 168, 255, 0.4);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--dark);
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Animated Tech Background */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 168, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 168, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        header {
            padding: 15px 30px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 3px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--blue-glow);
        }

        .logo {
            font-weight: 900;
            font-size: 1.4rem;
            letter-spacing: 2px;
            color: var(--primary);
            text-transform: uppercase;
        }

        /* Mastermind Stealth Viewport */
        .main-frame {
            flex-grow: 1;
            margin: 20px;
            background: white;
            border-radius: 15px;
            border: 1px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            display: none; /* Hidden until search */
        }

        iframe {
            position: absolute;
            top: -160px; /* Hide Google elements */
            left: 0;
            width: 100%;
            height: calc(100% + 160px);
            border: none;
            /* Blue/White Theme Filter */
            filter: contrast(1.1) brightness(1.1) saturate(0.8) hue-rotate(180deg) invert(0.05);
        }

        /* Modern Loading HUD */
        #loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .pulse {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse-animation 1.5s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 0.3; }
            100% { transform: scale(0.9); opacity: 0.7; }
        }

        /* Clean Command Center */
        .input-area {
            padding: 25px;
            background: white;
            display: flex;
            gap: 15px;
            border-top: 1px solid #ddd;
        }

        input {
            flex-grow: 1;
            padding: 15px 25px;
            border-radius: 30px;
            border: 2px solid #eee;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: var(--blue-glow);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 35px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--blue-glow);
        }
    </style>
</head>
<body>

<div class="grid-bg"></div>

<header>
    <div class="logo">CORE AI | OMNI</div>
    <div style="font-size: 0.8rem; color: #777;">SYSTEM STATUS: <span style="color: #00c853;">SECURE</span></div>
</header>

<div class="main-frame" id="displayArea">
    <iframe id="stealthEngine" src=""></iframe>
</div>

<div id="loader">
    <div class="pulse"></div>
    <h3 style="color: var(--primary); margin-top: 20px;">READY FOR COMMAND</h3>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Ask Mastermind anything..." autocomplete="off">
    <button class="btn" onclick="execute()">SEARCH</button>
</div>

<script>
    // Futuristic Blip Sound
    function playBeep() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function execute() {
        const q = document.getElementById('userInput').value;
        if(!q) return;

        playBeep();
        
        document.getElementById('loader').innerHTML = '<div class="pulse"></div><h3 style="color: var(--primary); margin-top: 20px;">SYNCING WITH DATA-STREAM...</h3>';
        document.getElementById('displayArea').style.display = 'none';

        const frame = document.getElementById('stealthEngine');
        frame.src = `https://www.google.com/search?q=${encodeURIComponent(q)}&igu=1`;

        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('displayArea').style.display = 'block';
        }, 1800);
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') execute();
    });
</script>

</body>
</html>
