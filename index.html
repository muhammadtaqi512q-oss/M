<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CORE AI | Invisible Mastermind</title>
    <style>
        :root {
            --primary: #000b1e;
            --accent: #ffd700;
            --glass: rgba(255, 255, 255, 0.05);
            --gold-glow: 0 0 25px rgba(255, 215, 0, 0.4);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', serif;
            background: var(--primary);
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Royal Header */
        header {
            padding: 25px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
            border-bottom: 2px solid var(--accent);
            box-shadow: var(--gold-glow);
            z-index: 10;
        }

        h1 {
            margin: 0;
            letter-spacing: 5px;
            color: var(--accent);
            text-transform: uppercase;
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* The Intelligence Area */
        .content-area {
            flex-grow: 1;
            position: relative;
            background: radial-gradient(circle, #001535 0%, #000b1e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Overlay to hide Google elements if needed */
        .frame-container {
            width: 95%;
            height: 90%;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--accent);
            box-shadow: var(--gold-glow);
            background: white;
            display: none; /* Hidden until first search */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Welcome Screen */
        #welcome-msg {
            text-align: center;
            font-style: italic;
            color: var(--accent);
            opacity: 0.7;
        }

        /* Modern Royal Search Bar */
        .search-container {
            padding: 30px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            gap: 15px;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
        }

        input {
            width: 50%;
            padding: 15px 25px;
            border-radius: 50px;
            border: 2px solid var(--accent);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            box-shadow: var(--gold-glow);
            width: 55%;
        }

        .ai-btn {
            background: var(--accent);
            color: var(--primary);
            border: none;
            padding: 10px 30px;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .ai-btn:hover {
            transform: scale(1.05);
            box-shadow: var(--gold-glow);
        }
    </style>
</head>
<body>

<header>
    <h1>lyra AI SYSTEM</h1>
</header>

<div class="content-area">
    <div id="welcome-msg">
        <h2>System Ready...</h2>
        <p>Awaiting Command for Mastermind Engine</p>
    </div>
    
    <div class="frame-container" id="display-window">
        <iframe id="mastermind-engine" src="about:blank"></iframe>
    </div>
</div>

<div class="search-container">
    <input type="text" id="userQuery" placeholder="Enter your command to CORE AI..." />
    <button class="ai-btn" onclick="executeMastermind()">Execute</button>
</div>

<script>
    function executeMastermind() {
        const query = document.getElementById('userQuery').value;
        if (!query) return;

        // Hide welcome message and show the result window
        document.getElementById('welcome-msg').style.display = 'none';
        const displayWindow = document.getElementById('display-window');
        displayWindow.style.display = 'block';

        // Load Google search into the frame silently
        // Using 'igu=1' to allow embedding where possible
        const engine = document.getElementById('mastermind-engine');
        engine.src = `https://www.google.com/search?q=${encodeURIComponent(query)}&igu=1`;
    }

    // Enter key support
    document.getElementById('userQuery').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            executeMastermind();
        }
    });
</script>

</body>
</html>
